<!DOCTYPE html>

<title>Journée des droits de la femme</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    cursor:none;
    background:#000;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:"Playfair Display", serif;
}

/* CONTENEUR 16/9 */
.frame-container{
    width:80vw;
    max-width:1400px;
    aspect-ratio:16/9;
    perspective:3000px;
}

/* CARTE */
.card{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transform-origin:center center;
    animation:rotateCard 48s infinite linear; /* 48s tour complet */
}

@keyframes rotateCard{
    0%{ transform:rotateY(0deg); }
    100%{ transform:rotateY(360deg); }
}

/* FACES */
.face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    border:12px solid #d4af37;
    box-shadow:0 0 70px rgba(212,175,55,0.7);
    border-radius:12px;
    overflow:hidden;
    background:#111;
}

.front{
    transform:rotateY(0deg);
}

.back{
    transform:rotateY(180deg);
}

.face img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* BANDEAU NOM */
.caption{
    position:absolute;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.65);
    color:#d4af37;
    text-align:center;
    padding:20px 0;
    font-size:26px;
    letter-spacing:3px;
}

/* OVERLAY LUMIÈRE */
.overlay{
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(
        120deg,
        rgba(255,255,255,0.05) 0%,
        rgba(200,200,200,0.18) 50%,
        rgba(255,255,255,0.05) 100%
    );
    animation:shine 18s infinite linear;
    pointer-events:none;
}

@keyframes shine{
    0%{ left:-100%; }
    100%{ left:100%; }
}

</style>
</head>

<body>

<div class="frame-container">
    <div class="card">

        <!-- RECTO -->
        <div class="face front">
            <img id="imgFront" src="">
            <div class="overlay"></div>
            <div class="caption" id="nomFront"></div>
        </div>

        <!-- VERSO -->
        <div class="face back">
            <img id="imgBack" src="">
            <div class="overlay"></div>
            <div class="caption" id="nomBack"></div>
